ath, MAX_PATH_LEN, &quot;%s\\*.%s&quot;, folder, ext);</span><br><span class="line"></span><br><span class="line">    WIN32_FIND_DATAA findData;</span><br><span class="line">    HANDLE hFind = FindFirstFileA(searchPath, &amp;findData);</span><br><span class="line">    if (hFind == INVALID_HANDLE_VALUE) &#123;</span><br><span class="line">        return 0;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    int count = 0;</span><br><span class="line">    do &#123;</span><br><span class="line">        if (!(findData.dwFileAttributes &amp; FILE_ATTRIBUTE_DIRECTORY)) &#123;</span><br><span class="line">            snprintf(files[count].path, MAX_PATH_LEN, &quot;%s\\%s&quot;, folder, findData.cFileName);</span><br><span class="line">            count++;</span><br><span class="line">            if (count &gt;= MAX_FILES) break;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125; while (FindNextFileA(hFind, &amp;findData));</span><br><span class="line"></span><br><span class="line">    FindClose(hFind);</span><br><span class="line">    return count;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">// 读取二进制文件内容</span><br><span class="line">int ReadBinaryFile(BinaryFile* file) &#123;</span><br><span class="line">    FILE* fp = fopen(file-&gt;path, &quot;rb&quot;);</span><br><span class="line">    if (!fp) &#123;</span><br><span class="line">        return -1;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    // 获取文件大小</span><br><span class="line">    fseek(fp, 0, SEEK_END);</span><br><span class="line">    long fileSize = ftell(fp);</span><br><span class="line">    rewind(fp);</span><br><span class="line"></span><br><span class="line">    // 检查是否为64位的整数倍</span><br><span class="line">    if (fileSize % 8 != 0) &#123;</span><br><span class="line">        fclose(fp);</span><br><span class="line">        return -1;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    file-&gt;dataCount = fileSize / 8;</span><br><span class="line">    file-&gt;data = (uint64_t*)malloc(fileSize);</span><br><span class="line">    if (!file-&gt;data) &#123;</span><br><span class="line">        fclose(fp);</span><br><span class="line">        return -1;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    if (fread(file-&gt;data, 8, file-&gt;dataCount, fp) != file-&gt;dataCount) &#123;</span><br><span class="line">        free(file-&gt;data);</span><br><span class="line">        fclose(fp);</span><br><span class="line">        return -1;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    fclose(fp);</span><br><span class="line">    return 0;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">// 提取RGB分量</span><br><span class="line">void ExtractRGB(uint64_t value, uint16_t* r, uint16_t* g, uint16_t* b) &#123;</span><br><span class="line">    *r = (value &gt;&gt; 32) &amp; 0xFFFF;  // 47:32</span><br><span class="line">    *g = (value &gt;&gt; 16) &amp; 0xFFFF;  // 31:16</span><br><span class="line">    *b = value &amp; 0xFFFF;          // 15:0</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">// 更新统计计数</span><br><span class="line">void UpdateCounts(int diff, int thr1, int thr2, int thr3, int thr4, int* counts) &#123;</span><br><span class="line">    if (diff == 0) counts[0]++;</span><br><span class="line">    else if (diff &lt;= thr1) counts[1]++;</span><br><span class="line">    else if (diff &lt;= thr2) counts[2]++;</span><br><span class="line">    else if (diff &lt;= thr3) counts[3]++;</span><br><span class="line">    else if (diff &lt;= thr4) counts[4]++;</span><br><span class="line">    else counts[5]++;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">// 打印通道统计到文件</span><br><span class="line">void PrintChannelStats(FILE* output, const char* channel, int* counts, </span><br><span class="line">                      int thr1, int thr2, int thr3, int thr4, int output_mode) &#123;</span><br><span class="line">    if (output_mode ==0) &#123;</span><br><span class="line">        fprintf(output, &quot;%s Channel:\n&quot;, channel);</span><br><span class="line">        fprintf(output, &quot;  Num[0]= %d; &quot;, counts[0]);</span><br><span class="line">        fprintf(output, &quot;  Num[1 to %d]= %d; &quot;, thr1, counts[1]);</span><br><span class="line">        fprintf(output, &quot;  Num[%d to %d]= %d; &quot;, thr1+1, thr2, counts[2]);</span><br><span class="line">        fprintf(output, &quot;  Num[%d to %d]= %d; &quot;, thr2+1, thr3, counts[3]);</span><br><span class="line">        fprintf(output, &quot;  Num[%d to %d]= %d; &quot;, thr3+1, thr4, counts[4]);</span><br><span class="line">        fprintf(output, &quot;  Num[&gt; %d]= %d\n&quot;, thr4, counts[5]);</span><br><span class="line">    &#125; else &#123;</span><br><span class="line">        //printf(&quot;Num= %d\n&quot;, counts[6]);</span><br><span class="line">        double ratio0= counts[0] ;</span><br><span class="line">        ratio0 = ratio0 / counts[6];</span><br><span class="line">        double ratio1= counts[1] ;</span><br><span class="line">        ratio1 = ratio1 / counts[6];</span><br><span class="line">        double ratio2= counts[2] ;</span><br><span class="line">        ratio2 = ratio2 / counts[6];</span><br><span class="line">        double ratio3= counts[3] ;</span><br><span class="line">        ratio3 = ratio3 / counts[6];</span><br><span class="line">        double ratio4= counts[4] ;</span><br><span class="line">        ratio4 = ratio4 / counts[6];</span><br><span class="line">        double ratio5= counts[5] ;</span><br><span class="line">        ratio5 = ratio5 / counts[6];</span><br><span class="line">        fprintf(output, &quot;%s Channel:\n&quot;, channel);</span><br><span class="line">        fprintf(output, &quot;  Num[0]= %.4f; &quot;, ratio0);</span><br><span class="line">        fprintf(output, &quot;  Num[1 to %d]= %.4f; &quot;, thr1, ratio1);</span><br><span class="line">        fprintf(output, &quot;  Num[%d to %d]= %.4f; &quot;, thr1+1, thr2, ratio2);</span><br><span class="line">        fprintf(output, &quot;  Num[%d to %d]= %.4f; &quot;, thr2+1, thr3, ratio3);</span><br><span class="line">        fprintf(output, &quot;  Num[%d to %d]= %.4f; &quot;, thr3+1, thr4, ratio4);</span><br><span class="line">        fprintf(output, &quot;  Num[&gt; %d]= %.4f\n&quot;, thr4, ratio5);</span><br><span class="line">    &#125;</span><br><span class="line">    </span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">// 比较文件并统计差值分布</span><br><span class="line">void CompareFiles(FILE* output, const BinaryFile* fileA, const BinaryFile* fileB, const char* extension,</span><br><span class="line">                 int thr1, int thr2, int thr3, int thr4, int output_mode) &#123;</span><br><span class="line">    int r_counts[7] = &#123;0&#125;;</span><br><span class="line">    int g_counts[7] = &#123;0&#125;;</span><br><span class="line">    int b_counts[7] = &#123;0&#125;;</span><br><span class="line"></span><br><span class="line">    for (int i = 0; i &lt; fileA-&gt;dataCount; i++) &#123;</span><br><span class="line">    //for (int i = 0; i &lt; 5012928; i++) &#123;</span><br><span class="line">        uint16_t a_r, a_g, a_b;</span><br><span class="line">        uint16_t b_r, b_g, b_b;</span><br><span class="line">        </span><br><span class="line">        ExtractRGB(fileA-&gt;data[i], &amp;a_r, &amp;a_g, &amp;a_b);</span><br><span class="line">        ExtractRGB(fileB-&gt;data[i], &amp;b_r, &amp;b_g, &amp;b_b);</span><br><span class="line"></span><br><span class="line">        // 计算差值并统计</span><br><span class="line">        UpdateCounts(abs((int)a_r - (int)b_r), thr1, thr2, thr3, thr4, r_counts);</span><br><span class="line">        UpdateCounts(abs((int)a_g - (int)b_g), thr1, thr2, thr3, thr4, g_counts);</span><br><span class="line">        UpdateCounts(abs((int)a_b - (int)b_b), thr1, thr2, thr3, thr4, b_counts);</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    r_counts[6] = fileA-&gt;dataCount;</span><br><span class="line">    g_counts[6] = fileA-&gt;dataCount;</span><br><span class="line">    b_counts[6] = fileA-&gt;dataCount;</span><br><span class="line"></span><br><span class="line"> </span><br><span class="line">    // 打印结果到文件</span><br><span class="line">    fprintf(output, &quot;\nFile: %s vs %s\n&quot;, fileA-&gt;path, fileB-&gt;path);</span><br><span class="line">    if(extension)&#123;</span><br><span class="line">        if (strcmp(extension,&quot;raw&quot;) == 0)&#123;</span><br><span class="line">            PrintChannelStats(output, &quot;Raw&quot;, b_counts, thr1, thr2, thr3, thr4, output_mode);</span><br><span class="line">        &#125; else if (strcmp(extension,&quot;rgb&quot;) == 0)&#123;</span><br><span class="line">            PrintChannelStats(output, &quot;Red&quot;, r_counts, thr1, thr2, thr3, thr4, output_mode);</span><br><span class="line">            PrintChannelStats(output, &quot;Green&quot;, g_counts, thr1, thr2, thr3, thr4, output_mode);</span><br><span class="line">            PrintChannelStats(output, &quot;Blue&quot;, b_counts, thr1, thr2, thr3, thr4, output_mode);</span><br><span class="line">        &#125; else if (strcmp(extension,&quot;yuv&quot;) == 0)&#123;</span><br><span class="line">            PrintChannelStats(output, &quot;Y&quot;, g_counts, thr1, thr2, thr3, thr4, output_mode);</span><br><span class="line">            PrintChannelStats(output, &quot;C&quot;, b_counts, thr1, thr2, thr3, thr4, output_mode);</span><br><span class="line">        &#125; else &#123;</span><br><span class="line">            printf(&quot;不支持文件拓展名：%s/n&quot;, extension);</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">int main(int argc, char* argv[]) &#123;</span><br><span class="line">    if (argc &lt; 10) &#123;</span><br><span class="line">        printf(&quot;Usage: %s folderA folderB extension thr1 thr2 thr3 thr4 output.txt\n&quot;, argv[0]);</span><br><span class="line">        printf(&quot;Example: %s A B rgb 5 10 20 50 result.txt 0 \n&quot;);</span><br><span class="line">        //argv[9]=0 打印区间范围内点的个数，argv[9]=0 打印区间范围内点的占比</span><br><span class="line">        return 1;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    const char* folderA = argv[1];</span><br><span class="line">    const char* folderB = argv[2];</span><br><span class="line">    const char* extension = argv[3];</span><br><span class="line">    int thr1 = atoi(argv[4]);</span><br><span class="line">    int thr2 = atoi(argv[5]);</span><br><span class="line">    int thr3 = atoi(argv[6]);</span><br><span class="line">    int thr4 = atoi(argv[7]);</span><br><span class="line">    const char* outputFilename = argv[8];</span><br><span class="line">    int output_mode=atoi(argv[9]);</span><br><span class="line"></span><br><span class="line">    // 验证阈值</span><br><span class="line">    if (thr1 &gt;= thr2 || thr2 &gt;= thr3 || thr3 &gt;= thr4) &#123;</span><br><span class="line">        printf(&quot;Error: Thresholds must be in increasing order\n&quot;);</span><br><span class="line">        return 1;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    // 打开输出文件</span><br><span class="line">    FILE* outputFile = fopen(outputFilename, &quot;w&quot;);</span><br><span class="line">    if (!outputFile) &#123;</span><br><span class="line">        printf(&quot;Error: Cannot open output file %s\n&quot;, outputFilename);</span><br><span class="line">        return 1;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    // 获取文件列表</span><br><span class="line">    BinaryFile filesA[MAX_FILES], filesB[MAX_FILES];</span><br><span class="line">    int countA = GetFiles(folderA, extension, filesA);</span><br><span class="line">    int countB = GetFiles(folderB, extension, filesB);</span><br><span class="line"></span><br><span class="line">    if (countA == 0 || countB == 0) &#123;</span><br><span class="line">        fprintf(outputFile, &quot;Error: No matching files found\n&quot;);</span><br><span class="line">        fclose(outputFile);</span><br><span class="line">        return 1;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    if (countA != countB) &#123;</span><br><span class="line">        fprintf(outputFile, &quot;Error: Different number of files (%d in A, %d in B)\n&quot;, countA, countB);</span><br><span class="line">        fclose(outputFile);</span><br><span class="line">        return 1;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    // 在输出文件中写入参数信息</span><br><span class="line">    fprintf(outputFile, &quot;Comparison Parameters:\n&quot;);</span><br><span class="line">    </span><br><span class="line">    fprintf(outputFile, &quot;Folder A: %s\n&quot;, folderA);</span><br><span class="line">    fprintf(outputFile, &quot;Folder B: %s\n&quot;, folderB);</span><br><span class="line">    fprintf(outputFile, &quot;File Extension: .%s\n&quot;, extension);</span><br><span class="line">    fprintf(outputFile, &quot;Thresholds: %d, %d, %d, %d\n\n&quot;, thr1, thr2, thr3, thr4);</span><br><span class="line"></span><br><span class="line">    // 读取并比较文件</span><br><span class="line">    for (int i = 0; i &lt; countA; i++) &#123;</span><br><span class="line">        if (ReadBinaryFile(&amp;filesA[i]) || ReadBinaryFile(&amp;filesB[i])) &#123;</span><br><span class="line">            fprintf(outputFile, &quot;Error reading files: %s or %s\n&quot;, filesA[i].path, filesB[i].path);</span><br><span class="line">            continue;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        if (filesA[i].dataCount != filesB[i].dataCount) &#123;</span><br><span class="line">            fprintf(outputFile, &quot;Error: Data count mismatch in files %s and %s (%d != %d)\n&quot;, </span><br><span class="line">                   filesA[i].path, filesB[i].path, filesA[i].dataCount, filesB[i].dataCount);</span><br><span class="line">            free(filesA[i].data);</span><br><span class="line">            free(filesB[i].data);</span><br><span class="line">            continue;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        CompareFiles(outputFile, &amp;filesA[i], &amp;filesB[i], extension, thr1, thr2, thr3, thr4, output_mode);</span><br><span class="line"></span><br><span class="line">        free(filesA[i].data);</span><br><span class="line">        free(filesB[i].data);</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    fclose(outputFile);</span><br><span class="line">    printf(&quot;Comparison completed. Results saved to %s\n&quot;, outputFilename);</span><br><span class="line">    return 0;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
